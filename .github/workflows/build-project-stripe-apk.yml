name: Build Project Stripe APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/build-project-stripe-apk.yml"

permissions:
  contents: write

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        id: build_apk
        shell: bash
        run: |
          VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))
          VERSION_NAME="0.3.${GITHUB_RUN_NUMBER}"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          gradle :app:assembleDebug \
            -PprojectStripeVersionCode="${VERSION_CODE}" \
            -PprojectStripeVersionName="${VERSION_NAME}" \
            --no-daemon \
            --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p ci-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk ci-artifacts/project-stripe-debug.apk

      - name: Upload Project Stripe APK
        uses: actions/upload-artifact@v4
        with:
          name: project-stripe-debug-apk
          path: ci-artifacts/project-stripe-debug.apk

      - name: Publish latest Project Stripe APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: project-stripe-latest
          name: Latest Project Stripe APK
          body: |
            Latest Project Stripe debug APK.

            Version: ${{ steps.build_apk.outputs.version_name }}
            Version code: ${{ steps.build_apk.outputs.version_code }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: ci-artifacts/project-stripe-debug.apk
